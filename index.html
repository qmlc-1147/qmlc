<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>迷你辅助合集售卖平台</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;max-width:480px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:15px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(102,126,234,.3)}.header h1{font-size:18px;font-weight:600}.badge{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px;font-size:12px}.page{display:none;padding:12px 12px 70px}.page.active{display:block}.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}.card h3{font-size:15px;margin-bottom:6px}.card p{font-size:13px;color:#666;line-height:1.5}.price{color:#764ba2;font-weight:700;font-size:16px}.btn{display:inline-block;padding:8px 20px;border-radius:20px;border:none;font-size:14px;cursor:pointer;transition:.2s;text-align:center;-webkit-appearance:none;appearance:none;touch-action:manipulation;outline:none}.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}.btn-primary:active{opacity:.8}.btn-danger{background:#ff4757;color:#fff}.btn-outline{background:transparent;border:1px solid #667eea;color:#667eea}.btn-sm{padding:5px 14px;font-size:12px}.btn-block{width:100%;padding:12px;font-size:15px;border-radius:25px;margin:4px 0}.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:#fff;display:flex;border-top:1px solid #eee;z-index:200;padding-bottom:env(safe-area-inset-bottom)}.bottom-nav a{flex:1;text-align:center;padding:8px 0;font-size:11px;color:#999;text-decoration:none}.bottom-nav a.active{color:#667eea}.bottom-nav a .icon{font-size:20px;display:block;margin-bottom:2px}.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}.modal-content{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;position:relative;z-index:1000}.modal-content h2{font-size:18px;margin-bottom:14px;text-align:center}.modal-content .form-group{margin-bottom:12px}.modal-content .form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}.modal-content .form-group input,.modal-content .form-group select,.modal-content .form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:0;transition:.2s}.tag{display:inline-block;background:#f0edff;color:#667eea;padding:2px 8px;border-radius:10px;font-size:11px;margin-right:4px}.status-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}.status-pending{background:#fff3cd;color:#856404}.status-approved{background:#d4edda;color:#155724}.status-rejected{background:#f8d7da;color:#721c24}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row-flex{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.text-center{text-align:center}.text-muted{color:#999;font-size:12px}.mt-8{margin-top:8px}.mb-8{margin-bottom:8px}.empty-state{text-align:center;padding:40px 20px;color:#999;font-size:14px}.modal-content .btn-block{margin:6px 0}</style></head><body><div class="header"><span style="font-size:18px;font-weight:600">迷你辅助合集</span><span id="hdrBadge" class="badge">未登录</span></div><div id="pgHome" class="page active"><div class="card" id="balCard" style="display:none"><div class="row-flex"><span>💰 余额</span><span style="font-size:20px;font-weight:700;color:#764ba2" id="balTxt">0.00</span></div></div><div id="prodList"></div></div><div id="pgWallet" class="page"><div class="card"><div class="row-flex"><span>💰 余额</span><span style="font-size:22px;font-weight:700;color:#764ba2" id="walBal">0.00</span></div></div><div class="grid-2"><button class="btn btn-primary btn-block" id="btnRecharge">充值</button><button class="btn btn-outline btn-block" id="btnWithdraw">提现</button></div><div class="card mt-8"><h3>交易记录</h3><div id="txList"><div class="text-muted text-center" style="padding:12px">暂无</div></div></div></div><div id="pgOrders" class="page"><div id="ordList"></div></div><div id="pgAdmin" class="page" style="display:none"><div class="card"><h3>⚙️ 管理后台</h3><p class="text-muted">管理员专用</p></div><div class="grid-2 mt-8"><button class="btn btn-outline btn-block" id="btnUserMgr">👥 用户管理</button><button class="btn btn-outline btn-block" id="btnProdMgr">📦 商品管理</button><button class="btn btn-outline btn-block" id="btnWdMgr">💳 提现审核</button><button class="btn btn-outline btn-block" id="btnAdmRecharge">💰 手动充值</button></div></div><div id="pgMyProds" class="page"><div id="myProdList"></div><button class="btn btn-primary btn-block" id="btnPubProd">➕ 发布商品</button></div><div id="pgProfile" class="page"><div class="card"><div class="row-flex"><span>👤 用户</span><span id="pfUser">未登录</span></div><div class="row-flex mt-8"><span>🏷️ 角色</span><span id="pfRole">普通用户</span></div></div><button class="btn btn-danger btn-block" id="btnLogout">退出登录</button></div><div class="bottom-nav"><a href="#" class="active" data-page="pgHome"><span class="icon">🏠</span>首页</a><a href="#" data-page="pgWallet"><span class="icon">💰</span>钱包</a><a href="#" data-page="pgOrders"><span class="icon">📋</span>订单</a><a href="#" data-page="pgMyProds"><span class="icon">📦</span>我的</a><a href="#" data-page="pgProfile"><span class="icon">👤</span>个人</a></div><div id="loginModal" class="modal"><div class="modal-content"><h2>🔐 登录 / 注册</h2><div class="form-group"><label>手机号</label><input id="loginPhone" type="tel" placeholder="请输入手机号" maxlength="11"></div><div class="form-group"><label>密码</label><input id="loginPwd" type="password" placeholder="请输入密码"></div><button class="btn btn-primary btn-block" id="btnLogin">登录</button><button class="btn btn-outline btn-block" id="btnRegister">注册新账号</button><p id="loginErr" class="text-muted text-center mt-8" style="color:#ff4757"></p></div></div><div id="rechargeModal" class="modal"><div class="modal-content"><h2>💰 充值</h2><p class="text-muted text-center mb-8">联系管理员转账后，管理员在后台为您充值</p><div class="form-group"><label>充值金额（平台币）</label><input id="rechargeAmt" type="number" min="1" placeholder="输入金额"></div><button class="btn btn-primary btn-block" id="btnSubmitRecharge">提交充值申请</button><button class="btn btn-outline btn-block" id="btnCancelRecharge">取消</button></div></div><div id="withdrawModal" class="modal"><div class="modal-content"><h2>💳 提现</h2><div class="form-group"><label>提现金额（平台币）</label><input id="wdAmt" type="number" min="1" placeholder="输入金额"></div><div class="form-group"><label>提现方式</label><select id="wdMethod"><option value="wechat">微信</option><option value="alipay">支付宝</option></select></div><div class="form-group"><label>账号</label><input id="wdAccount" type="text" placeholder="微信号 / 支付宝账号"></div><div class="form-group"><label>姓名</label><input id="wdName" type="text" placeholder="收款人姓名"></div><button class="btn btn-primary btn-block" id="btnSubmitWd">提交提现申请</button><button class="btn btn-outline btn-block" id="btnCancelWd">取消</button></div></div><div id="pubModal" class="modal"><div class="modal-content"><h2>📦 发布商品</h2><div class="form-group"><label>商品名称</label><input id="pubName" type="text" placeholder="如：王者荣耀代打" maxlength="30"></div><div class="form-group"><label>描述</label><textarea id="pubDesc" placeholder="详细描述你的商品" maxlength="200"></textarea></div><div class="form-group"><label>价格（平台币）</label><input id="pubPrice" type="number" min="1" placeholder="输入价格"></div><div class="form-group"><label>分类</label><select id="pubCat"><option value="游戏">🎮 游戏</option><option value="工具">🛠️ 工具</option><option value="教程">📖 教程</option><option value="其他">📌 其他</option></select></div><button class="btn btn-primary btn-block" id="btnSubmitPub">发布</button><button class="btn btn-outline btn-block" id="btnCancelPub">取消</button></div></div><div id="detailModal" class="modal"><div class="modal-content"><h2 id="dtName"></h2><p id="dtDesc" class="text-muted mb-8"></p><p>分类：<span id="dtCat" class="tag"></span></p><p>价格：<span id="dtPrice" class="price"></span></p><p>卖家：<span id="dtSeller"></span></p><p class="text-muted" id="dtTime"></p><button class="btn btn-primary btn-block" id="btnBuy">购买</button><button class="btn btn-outline btn-block" id="btnCloseDetail">关闭</button></div></div><div id="userMgrModal" class="modal"><div class="modal-content"><h2>👥 用户管理</h2><div id="userMgrList"></div><button class="btn btn-outline btn-block" id="btnCloseUserMgr">关闭</button></div></div><div id="prodMgrModal" class="modal"><div class="modal-content"><h2>📦 商品管理</h2><div id="prodMgrList"></div><button class="btn btn-outline btn-block" id="btnCloseProdMgr">关闭</button></div></div><div id="wdMgrModal" class="modal"><div class="modal-content"><h2>💳 提现审核</h2><div id="wdMgrList"></div><button class="btn btn-outline btn-block" id="btnCloseWdMgr">关闭</button></div></div><div id="admRechargeModal" class="modal"><div class="modal-content"><h2>💰 管理员充值</h2><div class="form-group"><label>用户手机号</label><input id="admRechargePhone" type="tel" placeholder="输入用户手机号" maxlength="11"></div><div class="form-group"><label>充值金额</label><input id="admRechargeAmt" type="number" min="1" placeholder="输入金额"></div><button class="btn btn-primary btn-block" id="btnAdmRechargeSubmit">确认充值</button><button class="btn btn-outline btn-block" id="btnCancelAdmRecharge">取消</button></div></div><script>var APP={};APP.data={};APP.data.load=function(k){var v=localStorage.getItem('mm_'+k);return v?JSON.parse(v):(k==='products'||k==='orders'||k==='withdraws'||k==='transactions'||k==='users'?[]:(k==='curUser'?'':[]))};APP.data.save=function(k,v){localStorage.setItem('mm_'+k,JSON.stringify(v))};APP.state={curUser:undefined,users:[],products:[],orders:[],withdraws:[],transactions:[]};APP.init=function(){APP.state.curUser=APP.data.load('curUser');APP.state.users=APP.data.load('users');APP.state.products=APP.data.load('products');APP.state.orders=APP.data.load('orders');APP.state.withdraws=APP.data.load('withdraws');APP.state.transactions=APP.data.load('transactions');APP.bindEvents();APP.updateUI();if(!APP.state.curUser){setTimeout(function(){APP.showModal('loginModal')},500)}};APP.showModal=function(id){var m=document.getElementById(id);if(m)m.classList.add('show')};APP.hideModal=function(id){var m=document.getElementById(id);if(m)m.classList.remove('show')};APP.switchPage=function(pg,el){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});var page=document.getElementById(pg);if(page)page.classList.add('active');document.querySelectorAll('.bottom-nav a').forEach(function(a){a.classList.remove('active')});if(el)el.classList.add('active')};APP.updateUI=function(){var cu=APP.state.curUser,b=document.getElementById('hdrBadge');if(cu){b.textContent=cu.phone+(cu.isAdmin?' (管理员)':'');document.getElementById('balCard').style.display='block';document.getElementById('balTxt').textContent=(cu.balance||0).toFixed(2);var adm=document.getElementById('pgAdmin');if(adm)adm.style.display=cu.isAdmin?'block':'none'}else{b.textContent='未登录';document.getElementById('balCard').style.display='none'}var wb=document.getElementById('walBal');if(wb)wb.textContent=(cu?cu.balance||0:0).toFixed(2);var pf=document.getElementById('pfUser');if(pf)pf.textContent=cu?cu.phone:'未登录';var pr=document.getElementById('pfRole');if(pr)pr.textContent=cu?(cu.isAdmin?'管理员':'普通用户'):'未登录';APP.renderProducts();if(cu){APP.renderMyProducts();APP.renderOrders();APP.renderTransactions()}if(cu&&cu.isAdmin){APP.renderUsers();APP.renderProductsAdmin();APP.renderWithdraws()}};APP.renderProducts=function(){var list=document.getElementById('prodList');if(!list)return;var active=APP.state.products.filter(function(x){return x.status==='active'});if(!active.length){list.innerHTML='<div class="empty-state"><div class="icon" style="font-size:48px">📦</div>暂无商品</div>';return}list.innerHTML=active.map(function(p){return'<div class="card" data-id="'+p.id+'"><h3>'+p.name+'</h3><p>'+p.desc+'</p><div class="row-flex mt-8"><span class="tag">'+p.cat+'</span><span class="price">'+p.price+' 币</span></div><div class="text-muted" style="font-size:11px">卖家: '+p.seller+'</div></div>'}).join('');list.querySelectorAll('.card').forEach(function(card){card.addEventListener('click',function(){var id=card.getAttribute('data-id');APP.showDetail(id)})})};APP.showDetail=function(id){if(!APP.state.curUser){APP.showModal('loginModal');return}var p=APP.state.products.find(function(x){return x.id===id});if(!p)return;document.getElementById('dtName').textContent=p.name;document.getElementById('dtDesc').textContent=p.desc||'暂无描述';document.getElementById('dtCat').textContent=p.cat;document.getElementById('dtPrice').textContent=p.price+' 平台币';document.getElementById('dtSeller').textContent=p.seller;document.getElementById('dtTime').textContent='发布时间: '+p.createdAt;var btn=document.getElementById('btnBuy');btn.setAttribute('data-id',id);btn.style.display=p.seller===APP.state.curUser.phone?'none':'block';APP.showModal('detailModal')};APP.buyProduct=function(){var id=document.getElementById('btnBuy').getAttribute('data-id'),p=APP.state.products.find(function(x){return x.id===id});if(!p||p.seller===APP.state.curUser.phone){alert('不能购买自己的商品');return}if(APP.state.curUser.balance<p.price){alert('余额不足，请先充值');return}var seller=APP.state.users.find(function(x){return x.phone===p.seller});APP.state.curUser.balance-=p.price;APP.data.save('curUser',APP.state.curUser);var uidx=APP.state.users.findIndex(function(x){return x.phone===APP.state.curUser.phone});if(uidx>=0){APP.state.users[uidx]=APP.state.curUser;APP.data.save('users',APP.state.users)}if(seller){seller.balance=(seller.balance||0)+p.price;var sidx=APP.state.users.findIndex(function(x){return x.phone===seller.phone});if(sidx>=0){APP.state.users[sidx]=seller;APP.data.save('users',APP.state.users)}}var ord={id:Date.now()+'',productId:p.id,productName:p.name,price:p.price,buyer:APP.state.curUser.phone,seller:p.seller,createdAt:new Date().toLocaleString(),status:'completed'};APP.state.orders.push(ord);APP.data.save('orders',APP.state.orders);var tx1={id:Date.now()+'',type:'buy',amount:-p.price,desc:'购买 '+p.name,time:new Date().toLocaleString(),user:APP.state.curUser.phone};var tx2={id:Date.now()+1+'',type:'sell',amount:p.price,desc:'出售 '+p.name,time:new Date().toLocaleString(),user:p.seller};APP.state.transactions.push(tx1,tx2);APP.data.save('transactions',APP.state.transactions);APP.hideModal('detailModal');APP.updateUI();alert('购买成功！')};APP.login=function(){var p=document.getElementById('loginPhone').value.trim(),pw=document.getElementById('loginPwd').value,err=document.getElementById('loginErr');if(!p||!pw){err.textContent='请填写手机号和密码';return}var u=APP.state.users.find(function(x){return x.phone===p});if(!u){err.textContent='用户不存在，请注册';return}if(u.pwd!==pw){err.textContent='密码错误';return}APP.state.curUser=u;APP.data.save('curUser',u);APP.hideModal('loginModal');APP.updateUI();err.textContent=''};APP.register=function(){var p=document.getElementById('loginPhone').value.trim(),pw=document.getElementById('loginPwd').value,err=document.getElementById('loginErr');if(!p||!pw){err.textContent='请填写手机号和密码';return}if(p.length!==11){err.textContent='手机号格式不正确';return}if(APP.state.users.find(function(x){return x.phone===p})){err.textContent='该手机号已注册';return}var isAdmin=p==='17811102021';var u={phone:p,pwd:pw,balance:0,isAdmin:isAdmin,createdAt:new Date().toLocaleString()};APP.state.users.push(u);APP.data.save('users',APP.state.users);APP.state.curUser=u;APP.data.save('curUser',u);APP.hideModal('loginModal');APP.updateUI();err.textContent=''};APP.logout=function(){if(confirm('确定退出？')){APP.state.curUser=undefined;localStorage.removeItem('mm_curUser');APP.updateUI()}};APP.publishProduct=function(){if(!APP.state.curUser){APP.showModal('loginModal');return}var n=document.getElementById('pubName').value.trim(),d=document.getElementById('pubDesc').value.trim(),p=parseFloat(document.getElementById('pubPrice').value),c=document.getElementById('pubCat').value;if(!n||!d||!p||p<1){alert('请填写完整信息');return}var prod={id:Date.now()+'',name:n,desc:d,price:p,cat:c,seller:APP.state.curUser.phone,createdAt:new Date().toLocaleString(),status:'active'};APP.state.products.push(prod);APP.data.save('products',APP.state.products);APP.hideModal('pubModal');document.getElementById('pubName').value='';document.getElementById('pubDesc').value='';document.getElementById('pubPrice').value='';APP.renderMyProducts();APP.renderProducts();alert('发布成功')};APP.renderMyProducts=function(){var list=document.getElementById('myProdList');if(!list)return;var my=APP.state.products.filter(function(x){return x.seller===APP.state.curUser.phone});if(!my.length){list.innerHTML='<div class="empty-state"><div class="icon" style="font-size:48px">📦</div>你还没有商品</div>';return}list.innerHTML=my.map(function(p){return'<div class="card"><div class="row-flex"><h3>'+p.name+'</h3><span class="price">'+p.price+'币</span></div><p class="text-muted">'+p.desc+'</p><div class="row-flex mt-8"><span class="tag">'+p.cat+'</span><span class="text-muted">'+(p.status==='active'?'出售中':'已下架')+'</span></div></div>'}).join('')};APP.renderOrders=function(){var list=document.getElementById('ordList');if(!list)return;var my=APP.state.orders.filter(function(x){return x.buyer===APP.state.curUser.phone||x.seller===APP.state.curUser.phone}).reverse();if(!my.length){list.innerHTML='<div class="empty-state"><div class="icon" style="font-size:48px">📋</div>暂无订单</div>';return}list.innerHTML=my.map(function(o){return'<div class="card"><h3>'+o.productName+'</h3><p class="text-muted">'+(o.buyer===APP.state.curUser.phone?'你购买了'+o.price+'币':'你出售了'+o.price+'币')+'</p><div class="row-flex mt-8"><span class="text-muted">'+o.createdAt+'</span><span class="status-badge status-approved">已完成</span></div></div>'}).join('')};APP.renderTransactions=function(){var list=document.getElementById('txList');if(!list)return;var my=APP.state.transactions.filter(function(x){return x.user===APP.state.curUser.phone}).slice(-20).reverse();if(!my.length){list.innerHTML='<div class="text-muted text-center" style="padding:12px">暂无记录</div>';return}list.innerHTML=my.map(function(t){return'<div class="row-flex"><span style="font-size:13px">'+t.desc+'</span><span style="font-size:13px;color:'+(t.amount>0?'#27ae60':'#e74c3c')+'">'+(t.amount>0?'+':'')+t.amount+'</span></div>'}).join('')};APP.submitRecharge=function(){if(!APP.state.curUser){APP.showModal('loginModal');return}var a=parseFloat(document.getElementById('rechargeAmt').value);if(!a||a<1){alert('请输入有效金额');return}var tx1={id:Date.now()+'',type:'recharge_request',amount:a,desc:'申请充值 '+a+' 币（需管理员确认）',time:new Date().toLocaleString(),user:APP.state.curUser.phone};APP.state.transactions.push(tx1);APP.data.save('transactions',APP.state.transactions);APP.hideModal('rechargeModal');document.getElementById('rechargeAmt').value='';alert('充值申请已提交，请联系管理员处理')};APP.submitWithdraw=function(){if(!APP.state.curUser){APP.showModal('loginModal');return}var a=parseFloat(document.getElementById('wdAmt').value),m=document.getElementById('wdMethod').value,ac=document.getElementById('wdAccount').value.trim(),nm=document.getElementById('wdName').value.trim();if(!a||a<1||!ac||!nm){alert('请填写完整信息');return}if(APP.state.curUser.balance<a){alert('余额不足');return}var w={id:Date.now()+'',phone:APP.state.curUser.phone,amount:a,method:m,account:ac,name:nm,status:'pending',createdAt:new Date().toLocaleString()};APP.state.withdraws.push(w);APP.data.save('withdraws',APP.state.withdraws);APP.hideModal('withdrawModal');document.getElementById('wd
