<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>迷你辅助合集 - 加载中...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#667eea;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}
.loader{text-align:center;color:#fff}
.loader h1{font-size:22px;margin-bottom:10px}
.loader p{font-size:14px;opacity:.8}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader">
<h1>⏳ 加载中...</h1>
<p>迷你辅助合集售卖平台</p>
<div class="spinner"></div>
</div>
<script>
// 尝试用多种方式加载主页面
var urls = [
  'https://gcore.jsdelivr.net/gh/qmlc-1147/mall-shop@fe4c24978a2bbc8dc9e4743fa15f0020b182c777/index.html',
  'https://fastly.jsdelivr.net/gh/qmlc-1147/mall-shop@fe4c24978a2bbc8dc9e4743fa15f0020b182c777/index.html',
  'https://testingcf.jsdelivr.net/gh/qmlc-1147/mall-shop@fe4c24978a2bbc8dc9e4743fa15f0020b182c777/index.html'
];

function tryLoad(idx) {
  if (idx >= urls.length) {
    document.body.innerHTML = '<div class="loader"><h1>❌ 加载失败</h1><p>请刷新重试</p></div>';
    return;
  }
  var xhr = new XMLHttpRequest();
  xhr.open('GET', urls[idx], true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      document.open();
      document.write(xhr.responseText);
      document.close();
    } else {
      tryLoad(idx + 1);
    }
  };
  xhr.onerror = function() { tryLoad(idx + 1); };
  xhr.send();
}
tryLoad(0);
</script>
</body>
</html>
